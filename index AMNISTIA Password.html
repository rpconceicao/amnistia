<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Acesso Reservado - Amnistia</title>
    <script>
        var password = "1234"; // A tua password aqui
        var user = prompt("Dashboard Reservado. Introduza a password de acesso:");

        if (user === password) {
            // Se a password estiver CORRETA, redireciona para o teu ficheiro do dashboard
            window.location.href = "dashboard.html";
        } else {
            // Se estiver ERRADA, vai para o site oficial
            alert("Password errada! Acesso negado.");
            window.location.href = "https://www.amnistia.pt"; 
        }
    </script>
</head>
<body style="background-color: #fafaf9; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>A verificar credenciais...</h2>
</body>
</html>
